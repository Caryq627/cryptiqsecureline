# Cryptiq Secure Line — Render multi-service config
# Two services from the same repo:
#   1. cryptiq-secure-line       — static HTML/CSS/JS (existing site)
#   2. cryptiq-secure-line-api   — Node web service for cross-device sync
# Render auto-detects this file on connect and creates / updates both.
services:
  - type: web
    name: cryptiq-secure-line
    runtime: static
    buildCommand: ""
    staticPublishPath: .
    headers:
      - path: /*
        name: Permissions-Policy
        value: camera=(self), microphone=(self)
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: X-Frame-Options
        value: DENY

  - type: web
    name: cryptiq-secure-line-api
    runtime: node
    plan: free
    rootDir: api
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
